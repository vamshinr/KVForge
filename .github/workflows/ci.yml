name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # CPU-only torch for CI (we skip GPU-marked tests)
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check kvforge/ tests/

      - name: Run tests (CPU only, GPU tests auto-skipped)
        run: pytest tests/ -v --tb=short

      - name: Smoke test CLIs
        run: |
          python -m kvforge.profile --tiny --context 16 --warmup 1 --iters 2
          python -m kvforge.optimize --kernels rmsnorm
